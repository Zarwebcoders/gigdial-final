<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background circle/glow -->
  <circle cx="200" cy="200" r="160" fill="url(#circle-glow)" />

  <!-- Worker silhouette with crossed arms -->
  <!-- Arms crossed -->
  <path d="M120 280c20-10 60-15 80-15s60 5 80 15c10 5 15 20 15 35v30H105v-30c0-15 5-30 15-35z" fill="#0F2C59" />
  
  <!-- Left sleeve and arm -->
  <path d="M120 280c-10 10-20 30-20 50h40c5-15 15-35 25-45l-45-5z" fill="#0F5FC2" />
  
  <!-- Right sleeve and arm -->
  <path d="M280 280c10 10 20 30 20 50h-40c-5-15-15-35-25-45l45-5z" fill="#0F5FC2" />
  
  <!-- Crossed hands details -->
  <!-- Left hand resting on right arm -->
  <path d="M150 295c10 10 25 15 30 5s-5-20-15-25l-15 20z" fill="#F3A582" />
  <!-- Right hand resting on left arm -->
  <path d="M250 295c-10 10-25 15-30 5s5-20 15-25l15 20z" fill="#F3A582" />

  <!-- Shirt collar -->
  <path d="M170 240l30 25 30-25-10-15h-40l-10 15z" fill="#FF7A00" />
  <path d="M192 248h16v40h-16z" fill="#FFFFFF" />

  <!-- Neck -->
  <rect x="185" y="205" width="30" height="40" rx="4" fill="#F3A582" />
  
  <!-- Head & Face -->
  <rect x="160" y="120" width="80" height="95" rx="40" fill="#F3A582" />
  
  <!-- Hair & Cap (Technician Cap in blue & orange) -->
  <!-- Cap Dome -->
  <path d="M160 140c0-30 20-45 40-45s40 15 40 45H160z" fill="#0F2C59" />
  <!-- Cap Visor/Brim (pointing slightly right) -->
  <path d="M170 125c15-8 40-8 60 0s15 10 15 10H160s5-8 10-10z" fill="#FF7A00" />
  
  <!-- Ears -->
  <circle cx="157" cy="168" r="7" fill="#F3A582" />
  <circle cx="243" cy="168" r="7" fill="#F3A582" />

  <!-- Eyes -->
  <circle cx="185" cy="155" r="4" fill="#1E293B" />
  <circle cx="215" cy="155" r="4" fill="#1E293B" />
  
  <!-- Smile -->
  <path d="M185 185c8 8 22 8 30 0" stroke="#1E293B" stroke-width="3" stroke-linecap="round" fill="none" />
  
  <!-- Nose -->
  <path d="M200 162v10c0 .5-.5 1-1 1h-2" stroke="#E28761" stroke-width="2.5" stroke-linecap="round" fill="none" />
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="circle-glow" x1="40" y1="40" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED" />
      <stop offset="1" stop-color="#FFEDD5" />
    </linearGradient>
  </defs>
</svg>
